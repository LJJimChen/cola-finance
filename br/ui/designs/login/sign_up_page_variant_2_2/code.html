<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - Minimalist White</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#2563EB", // Deeper blue for better contrast on light backgrounds
                        "primary-dark": "#1d4ed8",
                        "surface-subtle": "#f8fafc",
                    }, 
                    fontFamily: {
                        display: "Inter"
                    }, 
                    borderRadius: {
                        DEFAULT: "0.25rem", 
                        lg: "0.5rem", 
                        xl: "0.75rem", 
                        full: "9999px"
                    }
                }
            }
        };
    </script>
<style>
        body {
          min-height: max(600px, 100dvh);
        }
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: #0f172a !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-white min-h-screen font-display text-slate-900 selection:bg-blue-100 selection:text-blue-900 flex flex-col items-center justify-center p-6">
<div class="w-full max-w-sm mx-auto flex flex-col gap-10">
<div class="text-center space-y-2">
<div class="w-12 h-12 bg-surface-subtle rounded-xl border border-slate-200 flex items-center justify-center mx-auto mb-6 shadow-sm">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">lock_person</span>
</div>
<h1 class="text-2xl font-semibold tracking-tight text-slate-900">Create Account</h1>
<p class="text-slate-500 text-sm">Join the secure family asset panorama.</p>
</div>
<div class="flex flex-col gap-6">
<div class="group">
<input class="block w-full px-0 py-3 bg-transparent border-0 border-b border-slate-200 text-slate-900 placeholder-slate-400 focus:border-primary focus:ring-0 focus:outline-none transition-colors text-base" placeholder="Username / Phone / Email" type="text"/>
</div>
<div class="group relative">
<input class="block w-full px-0 py-3 bg-transparent border-0 border-b border-slate-200 text-slate-900 placeholder-slate-400 focus:border-primary focus:ring-0 focus:outline-none transition-colors text-base pr-10" placeholder="Password" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center text-slate-400 hover:text-slate-600 transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
<div class="group">
<input class="block w-full px-0 py-3 bg-transparent border-0 border-b border-slate-200 text-slate-900 placeholder-slate-400 focus:border-primary focus:ring-0 focus:outline-none transition-colors text-base" placeholder="Confirm Password" type="password"/>
</div>
<button class="w-full mt-6 bg-primary hover:bg-primary-dark text-white font-medium text-sm py-4 rounded-lg transition-all duration-200 shadow-lg shadow-blue-200">
                Sign Up
            </button>
<div class="text-center mt-2">
<a class="text-sm text-slate-500 hover:text-primary transition-colors flex items-center justify-center gap-1" href="#">
                    Already have an account? <span class="text-primary font-medium hover:text-primary-dark hover:underline underline-offset-4 decoration-primary/30 transition-all">Log in</span>
</a>
</div>
</div>
<div class="mt-auto pt-8 flex flex-col items-center gap-4 opacity-70 hover:opacity-100 transition-opacity">
<div class="flex items-center gap-1.5 text-[10px] font-semibold tracking-widest text-slate-400 uppercase">
<span class="material-symbols-outlined text-primary" style="font-size: 14px;">encrypted</span>
<span>Local Encryption Active</span>
</div>
</div>
</div>

</body></html>
