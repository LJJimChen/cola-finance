openapi: 3.1.0
info:
  title: Cola Finance Engine API (Internal)
  version: 1.0.0
  description: |
    Internal API for the Engine service.
    
    **SECURITY NOTICE**: This API is NOT exposed to the public internet.
    All requests MUST be authenticated with a short-lived JWT token issued by the BFF.
    The Engine validates tokens before executing any task.

servers:
  - url: http://engine.cola-finance.internal:3000
    description: Internal network only

security:
  - BFFDelegationToken: []

tags:
  - name: Authorization
    description: Broker authorization tasks
  - name: Collection
    description: Portfolio data collection tasks
  - name: Health
    description: Service health and status

paths:
  # ========== Health ==========
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  version:
                    type: string
                  uptime:
                    type: number

  # ========== Authorization ==========
  /authorize:
    post:
      tags: [Authorization]
      summary: Execute broker authorization
      description: |
        Executes a broker authorization task using browser automation.
        This endpoint is called by the BFF with a short-lived JWT token (5 minutes).
        
        If human verification is required (captcha/2FA), the task enters 'paused' state
        and returns a verification URL. The frontend guides the user to complete verification,
        then the task resumes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task_id, broker_id, user_id]
              properties:
                task_id:
                  type: string
                  format: uuid
                  description: Authorization task ID (from BFF)
                broker_id:
                  type: string
                  description: Broker identifier (e.g., 'futu')
                user_id:
                  type: string
                  format: uuid
                  description: User ID (for task ownership validation)
      responses:
        '200':
          description: Authorization in progress or requires verification
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthorizationInProgress'
                  - $ref: '#/components/schemas/AuthorizationNeedsVerification'
                  - $ref: '#/components/schemas/AuthorizationCompleted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /authorize/{taskId}/resume:
    post:
      tags: [Authorization]
      summary: Resume paused authorization task
      description: |
        Called after user completes human verification (captcha/2FA).
        The task resumes from the paused state.
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task resumed
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthorizationInProgress'
                  - $ref: '#/components/schemas/AuthorizationCompleted'
        '400':
          description: Task not in paused state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ========== Collection ==========
  /collect:
    post:
      tags: [Collection]
      summary: Execute portfolio data collection
      description: |
        Collects holdings and performance data from a broker connection.
        Uses browser automation to scrape portfolio data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task_id, connection_id, user_id]
              properties:
                task_id:
                  type: string
                  format: uuid
                  description: Collection task ID (from BFF)
                connection_id:
                  type: string
                  format: uuid
                  description: Broker connection ID
                user_id:
                  type: string
                  format: uuid
                  description: User ID (for task ownership validation)
      responses:
        '200':
          description: Collection in progress or completed
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CollectionInProgress'
                  - $ref: '#/components/schemas/CollectionCompleted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Connection not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BFFDelegationToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived JWT token (5 minutes) issued by BFF.
        Claims: { iss, sub (user_id), aud, exp, iat, task_id, task_type, broker_id }

  schemas:
    # ========== Authorization ==========
    AuthorizationInProgress:
      type: object
      required: [task_id, status]
      properties:
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [in_progress]
        message:
          type: string
          example: Authorization in progress

    AuthorizationNeedsVerification:
      type: object
      required: [task_id, status, verification_url, verification_type]
      properties:
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [paused]
        verification_url:
          type: string
          format: uri
          description: URL where user completes verification
          example: https://futu.com/verify?session=abc123
        verification_type:
          type: string
          enum: [captcha, 2fa, consent]
        message:
          type: string
          example: Please complete captcha verification

    AuthorizationCompleted:
      type: object
      required: [task_id, status, connection_id]
      properties:
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed]
        connection_id:
          type: string
          format: uuid
          description: Created broker connection ID
        message:
          type: string
          example: Authorization successful

    # ========== Collection ==========
    CollectionInProgress:
      type: object
      required: [task_id, status]
      properties:
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [in_progress]
        holdings_collected:
          type: integer
          minimum: 0
          description: Number of holdings collected so far
        message:
          type: string
          example: Collection in progress

    CollectionCompleted:
      type: object
      required: [task_id, status, holdings_collected]
      properties:
        task_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed, partial]
        holdings_collected:
          type: integer
          minimum: 0
        holdings_failed:
          type: integer
          minimum: 0
          description: Number of holdings that failed to collect (for partial status)
        partial_reason:
          type: string
          nullable: true
          description: Reason for partial collection (e.g., 'broker API timeout')
        message:
          type: string
          example: Collection completed

    # ========== Error ==========
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: invalid_token
        message:
          type: string
          example: JWT token is invalid or expired
        details:
          type: object
          nullable: true

  responses:
    BadRequest:
      description: Bad request (validation error)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized (invalid or expired JWT token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
