# OpenAPI Contract: Asset Management System

openapi: 3.0.3
info:
  title: Asset Management System API
  description: API for managing user assets, portfolios, and rebalancing
  version: 1.0.0
  contact:
    name: API Support
    email: support@cola-finance.com

servers:
  - url: http://localhost:8787
    description: Local development server
  - url: https://bff.cola-finance.workers.dev
    description: Production Cloudflare Workers server

tags:
  - name: auth
    description: Authentication and session management
  - name: user
    description: User profile and settings
  - name: portfolio
    description: Portfolio data and analytics
  - name: assets
    description: Individual asset management
  - name: categories
    description: Asset categorization
  - name: exchange-rates
    description: Currency conversion rates
  - name: rebalancing
    description: Portfolio rebalancing tools

paths:
  /api/auth/login:
    post:
      tags:
        - auth
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
              required:
                - email
                - password
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
        '400':
          description: Invalid request format

  /api/auth/logout:
    post:
      tags:
        - auth
      summary: User logout
      responses:
        '200':
          description: Successfully logged out

  /api/user/profile:
    get:
      tags:
        - user
      summary: Get user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
    put:
      tags:
        - user
      summary: Update user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  /api/portfolio/overview:
    get:
      tags:
        - portfolio
      summary: Get portfolio overview
      security:
        - bearerAuth: []
      parameters:
        - name: currency
          in: query
          required: false
          description: Target currency for display (default: user preference)
          schema:
            type: string
            default: CNY
      responses:
        '200':
          description: Portfolio overview data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioOverview'

  /api/portfolio/history:
    get:
      tags:
        - portfolio
      summary: Get portfolio history
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          required: false
          description: Start date for history (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          description: End date for history (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: currency
          in: query
          required: false
          description: Target currency for display (default: user preference)
          schema:
            type: string
            default: CNY
      responses:
        '200':
          description: Portfolio history data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioHistory'

  /api/assets:
    get:
      tags:
        - assets
      summary: Get user's assets
      security:
        - bearerAuth: []
      parameters:
        - name: categoryId
          in: query
          required: false
          description: Filter by category ID
          schema:
            type: string
        - name: currency
          in: query
          required: false
          description: Target currency for display (default: user preference)
          schema:
            type: string
            default: CNY
      responses:
        '200':
          description: List of user's assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Asset'
    post:
      tags:
        - assets
      summary: Add a new asset
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreate'
      responses:
        '201':
          description: Asset created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'

  /api/assets/{id}:
    get:
      tags:
        - assets
      summary: Get a specific asset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
    put:
      tags:
        - assets
      summary: Update an asset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetUpdate'
      responses:
        '200':
          description: Asset updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
    delete:
      tags:
        - assets
      summary: Delete an asset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Asset deleted successfully

  /api/categories:
    get:
      tags:
        - categories
      summary: Get user's categories
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user's categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      tags:
        - categories
      summary: Create a new category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'

  /api/categories/{id}:
    get:
      tags:
        - categories
      summary: Get a specific category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
    put:
      tags:
        - categories
      summary: Update a category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
    delete:
      tags:
        - categories
      summary: Delete a category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Category deleted successfully

  /api/exchange-rates:
    get:
      tags:
        - exchange-rates
      summary: Get exchange rates
      parameters:
        - name: from
          in: query
          required: true
          description: Source currency
          schema:
            type: string
        - name: to
          in: query
          required: true
          description: Target currency
          schema:
            type: string
        - name: date
          in: query
          required: false
          description: Date for historical rates (YYYY-MM-DD, default: today)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Exchange rate data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExchangeRate'

  /api/rebalancing/recommendations:
    get:
      tags:
        - rebalancing
      summary: Get rebalancing recommendations
      security:
        - bearerAuth: []
      parameters:
        - name: currency
          in: query
          required: false
          description: Target currency for display (default: user preference)
          schema:
            type: string
            default: CNY
      responses:
        '200':
          description: Rebalancing recommendations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebalancingRecommendations'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT token for authentication
        user:
          $ref: '#/components/schemas/UserProfile'
      required:
        - token
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: string
          description: User ID
        email:
          type: string
          format: email
        language:
          type: string
          enum: [zh, en]
          description: Preferred language
        theme:
          type: string
          enum: [light, dark, system]
          description: UI theme preference
        displayCurrency:
          type: string
          description: Default currency for display
          default: CNY
        createdAt:
          type: string
          format: date-time
          description: Account creation time (UTC)
        updatedAt:
          type: string
          format: date-time
          description: Last update time (UTC)
      required:
        - id
        - email
        - language
        - theme
        - displayCurrency
        - createdAt
        - updatedAt

    UserProfileUpdate:
      type: object
      properties:
        language:
          type: string
          enum: [zh, en]
        theme:
          type: string
          enum: [light, dark, system]
        displayCurrency:
          type: string
          description: Default currency for display

    PortfolioOverview:
      type: object
      properties:
        totalValue:
          type: number
          format: decimal
          description: Total portfolio value in target currency
        dailyProfit:
          type: number
          format: decimal
          description: Today's profit in target currency
        annualReturn:
          type: number
          format: decimal
          description: Annual return percentage
        assetDistribution:
          type: array
          items:
            $ref: '#/components/schemas/AssetDistribution'
        currency:
          type: string
          description: Currency in which values are displayed
      required:
        - totalValue
        - dailyProfit
        - annualReturn
        - assetDistribution
        - currency

    AssetDistribution:
      type: object
      properties:
        categoryId:
          type: string
          description: Category ID
        categoryName:
          type: string
          description: Category name
        percentage:
          type: number
          format: decimal
          description: Percentage of total portfolio
        value:
          type: number
          format: decimal
          description: Value in target currency
      required:
        - categoryId
        - categoryName
        - percentage
        - value

    PortfolioHistory:
      type: object
      properties:
        history:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioHistoryItem'
        currency:
          type: string
          description: Currency in which values are displayed
      required:
        - history
        - currency

    PortfolioHistoryItem:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date of the snapshot
        totalValue:
          type: number
          format: decimal
          description: Total portfolio value in target currency
        dailyProfit:
          type: number
          format: decimal
          description: Daily profit in target currency
        totalProfit:
          type: number
          format: decimal
          description: Total accumulated profit in target currency
      required:
        - date
        - totalValue
        - dailyProfit
        - totalProfit

    Asset:
      type: object
      properties:
        id:
          type: string
          description: Asset ID
        userId:
          type: string
          description: User ID
        symbol:
          type: string
          description: Asset symbol
        name:
          type: string
          description: Full name of the asset
        quantity:
          type: number
          format: decimal
          description: Number of shares/units held
        costBasis:
          type: number
          format: decimal
          description: Average cost of acquiring the position
        dailyProfit:
          type: number
          format: decimal
          description: Daily profit for the individual asset
        currentPrice:
          type: number
          format: decimal
          description: Current market price
        currency:
          type: string
          description: Currency of the asset
        brokerSource:
          type: string
          description: Source broker
        categoryId:
          type: string
          description: Assigned category ID
        createdAt:
          type: string
          format: date-time
          description: Creation time (UTC)
        updatedAt:
          type: string
          format: date-time
          description: Last update time (UTC)
      required:
        - id
        - userId
        - symbol
        - name
        - quantity
        - costBasis
        - dailyProfit
        - currentPrice
        - currency
        - brokerSource
        - categoryId
        - createdAt
        - updatedAt

    AssetCreate:
      type: object
      properties:
        symbol:
          type: string
          description: Asset symbol
        name:
          type: string
          description: Full name of the asset
        quantity:
          type: number
          format: decimal
          description: Number of shares/units held
        costBasis:
          type: number
          format: decimal
          description: Average cost of acquiring the position
        dailyProfit:
          type: number
          format: decimal
          description: Daily profit for the individual asset
        currentPrice:
          type: number
          format: decimal
          description: Current market price
        currency:
          type: string
          description: Currency of the asset
          default: CNY
        brokerSource:
          type: string
          description: Source broker
        categoryId:
          type: string
          description: Assigned category ID
      required:
        - symbol
        - name
        - quantity
        - costBasis
        - dailyProfit
        - currentPrice
        - currency
        - brokerSource
        - categoryId

    AssetUpdate:
      type: object
      properties:
        quantity:
          type: number
          format: decimal
          description: Number of shares/units held
        costBasis:
          type: number
          format: decimal
          description: Average cost of acquiring the position
        dailyProfit:
          type: number
          format: decimal
          description: Daily profit for the individual asset
        currentPrice:
          type: number
          format: decimal
          description: Current market price
        categoryId:
          type: string
          description: Assigned category ID

    Category:
      type: object
      properties:
        id:
          type: string
          description: Category ID
        userId:
          type: string
          description: User ID
        name:
          type: string
          description: Category name
        targetAllocation:
          type: number
          format: decimal
          description: Target percentage allocation (0-100)
        createdAt:
          type: string
          format: date-time
          description: Creation time (UTC)
        updatedAt:
          type: string
          format: date-time
          description: Last update time (UTC)
      required:
        - id
        - userId
        - name
        - targetAllocation
        - createdAt
        - updatedAt

    CategoryCreate:
      type: object
      properties:
        name:
          type: string
          description: Category name
        targetAllocation:
          type: number
          format: decimal
          description: Target percentage allocation (0-100)
      required:
        - name
        - targetAllocation

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          description: Category name
        targetAllocation:
          type: number
          format: decimal
          description: Target percentage allocation (0-100)

    ExchangeRate:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date of the exchange rate
        fromCurrency:
          type: string
          description: Source currency code
        toCurrency:
          type: string
          description: Target currency code (always CNY for base rates)
        rateValue:
          type: number
          format: decimal
          description: Conversion rate
      required:
        - date
        - fromCurrency
        - toCurrency
        - rateValue

    RebalancingRecommendations:
      type: object
      properties:
        currentAllocations:
          type: array
          items:
            $ref: '#/components/schemas/CategoryAllocation'
        targetAllocations:
          type: array
          items:
            $ref: '#/components/schemas/CategoryAllocation'
        deviation:
          type: array
          items:
            $ref: '#/components/schemas/Deviation'
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/Recommendation'
        currency:
          type: string
          description: Currency in which values are displayed
      required:
        - currentAllocations
        - targetAllocations
        - deviation
        - recommendations
        - currency

    CategoryAllocation:
      type: object
      properties:
        categoryId:
          type: string
          description: Category ID
        categoryName:
          type: string
          description: Category name
        currentPercentage:
          type: number
          format: decimal
          description: Current percentage allocation
        targetPercentage:
          type: number
          format: decimal
          description: Target percentage allocation
        currentValue:
          type: number
          format: decimal
          description: Current value in target currency
        targetValue:
          type: number
          format: decimal
          description: Target value in target currency
      required:
        - categoryId
        - categoryName
        - currentPercentage
        - targetPercentage
        - currentValue
        - targetValue

    Deviation:
      type: object
      properties:
        categoryId:
          type: string
          description: Category ID
        categoryName:
          type: string
          description: Category name
        deviationPercentage:
          type: number
          format: decimal
          description: Deviation from target allocation (%)
        deviationValue:
          type: number
          format: decimal
          description: Deviation from target allocation (value)
      required:
        - categoryId
        - categoryName
        - deviationPercentage
        - deviationValue

    Recommendation:
      type: object
      properties:
        categoryId:
          type: string
          description: Category ID
        categoryName:
          type: string
          description: Category name
        action:
          type: string
          enum: [buy, sell]
          description: Recommended action
        amount:
          type: number
          format: decimal
          description: Amount to buy/sell in target currency
        reason:
          type: string
          description: Reason for recommendation
      required:
        - categoryId
        - categoryName
        - action
        - amount
        - reason